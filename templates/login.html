{% extends "base.html" %}
{% block title %}Login — QuantumVault{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h2>QuantumVault</h2>
      <p>Sign in to your secure workspace</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" data-loading>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-3" id="login-btn">
        <span class="spin"></span>
        <span class="btn-text">Sign In →</span>
      </button>
    </form>
    <p class="text-center mt-3" style="font-size:.875rem; color:var(--fg-dim);">
      No account? <a href="{{ url_for('auth.register') }}" style="color:var(--cyan);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
