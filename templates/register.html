{% extends "base.html" %}
{% block title %}Register — QuantumVault{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="logo-icon">🛡️</div>
      <h2>Create Account</h2>
      <p>Join QuantumVault — secure data transfer starts here</p>
    </div>
    <form method="POST" action="{{ url_for('auth.register') }}" data-loading>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="work@company.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Company / Organization</label>
        <input type="text" name="company" class="form-control" placeholder="Your company name (optional)"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="font-size:.75rem; color:var(--fg-dim);">(min 8 chars)</span></label>
        <input type="password" name="password" class="form-control" placeholder="Strong password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-3">
        <span class="spin"></span>
        <span class="btn-text">Create Account →</span>
      </button>
    </form>
    <p class="text-center mt-3" style="font-size:.875rem; color:var(--fg-dim);">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--cyan);">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
