{% extends "base.html" %}

{% block title %}Upload File — Secure Storage{% endblock %}

{% block content %}
<div style="max-width:600px; margin:2rem auto;">
  <div class="card" style="text-align:center; margin-bottom:2rem;">
    <div style="font-size:3rem; margin-bottom:1rem;">📤</div>
    <h2 class="gradient-text" style="margin-bottom:.5rem;">Upload Secure File</h2>
    <p class="text-muted" style="font-size:.9rem; line-height:1.5;">
      Upload any file directly into your permanent PostgreSQL storage vault.
    </p>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('files.upload_file') }}" enctype="multipart/form-data" data-progress>
      <div class="form-group">
        <label class="form-label">Select File to Upload</label>
        <input type="file" name="file" class="form-control" style="padding:1rem; cursor:pointer;" required>
      </div>

      <div class="progress-bar-wrapper"><div class="progress-bar-fill"></div></div>
      <button type="submit" class="btn btn-cyan btn-full btn-lg" style="margin-top:1rem;">
        <span class="spinner"></span>
        <span class="btn-label">Upload File →</span>
      </button>
    </form>
  </div>
</div>
{% endblock %}
